<!DOCTYPE html>
<html>
<head>
    <title>Local LLM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app-container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Sessions</h2>

        <div class="session-list">
            <div class="session-item">
                <span>Flask UI Notes</span>
                <span class="session-menu">⋯</span>
            </div>
            <div class="session-item">
                <span>AWS Study</span>
                <span class="session-menu">⋯</span>
            </div>
            <div class="session-item">
                <span>Beyblade Builds</span>
                <span class="session-menu">⋯</span>
            </div>
        </div>

        <button class="new-chat">+ New Chat</button>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-container">

        <div id="chat-window"></div>

        <div class="input-area">
            <input id="message-input" type="text" placeholder="Ask something...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>
async function sendMessage() {
    const input = document.getElementById("message-input")
    const chatWindow = document.getElementById("chat-window")
    const userMessage = input.value
    if (!userMessage) return
    chatWindow.innerHTML += `<div class="user-msg">${userMessage}</div>`
    input.value = ""
    const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMessage })
    })
    const data = await response.json()
    chatWindow.innerHTML += `<div class="assistant-msg">${data.reply}</div>`
    chatWindow.scrollTop = chatWindow.scrollHeight
}
</script>

</body>
</html>
