<!DOCTYPE html>
<html>
<head>
    <title>Local LLM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app-container">

 <!-- Sidebar -->
    <div id="sidebar">
        <h3>Chat History</h3>
        <ul id="session-list"></ul>
        <button class="new-chat" onclick="createNewSession()">+ New Chat</button>
    </div>

      

    <!-- Main Chat Area -->
    <div class="chat-container">

        <div id="chat-window"></div>

        <div class="input-area">
            <input id="message-input" type="text" placeholder="Ask something...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>

async function sendMessage() {
    const input = document.getElementById("message-input")
    const chatWindow = document.getElementById("chat-window")

    const userMessage = input.value
    if (!userMessage) return

    chatWindow.innerHTML += `<div class="user-msg">${userMessage}</div>`
    input.value = ""

    const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMessage })
    })

    const reader = response.body.getReader()
    const decoder = new TextDecoder()

    let assistantDiv = document.createElement("div")
    assistantDiv.className = "assistant-msg"
    chatWindow.appendChild(assistantDiv)

    let done = false

    let fullText = ""

    while (!done) {
        const { value, done: doneReading } = await reader.read()
        done = doneReading

        const chunk = decoder.decode(value || new Uint8Array())
        fullText += chunk
        assistantDiv.innerHTML = fullText.replace(/\n/g, "<br>")
    }

    chatWindow.scrollTop = chatWindow.scrollHeight

    loadSessions()
}


async function loadSessions() {
    const response = await fetch("/sessions")
    const sessions = await response.json()

    const list = document.getElementById("session-list")
    list.innerHTML = ""

    sessions.forEach(session => {
        const div = document.createElement("div")
        div.className = "session-item"

        const date = new Date(session.start_time).toLocaleString()
        div.textContent = date

        div.onclick = () => loadSession(session.session_id)

        list.appendChild(div)
    })
}


async function loadSession(sessionId) {
    const response = await fetch(`/session/${sessionId}`)
    const messages = await response.json()

    const chatWindow = document.getElementById("chat-window")
    chatWindow.innerHTML = ""

    messages.forEach(msg => {
        const div = document.createElement("div")

        if (msg.role === "user") {
            div.className = "user-msg"
        } else {
            div.className = "assistant-msg"
        }

        div.innerHTML = msg.content.replace(/\n/g, "<br>")
        chatWindow.appendChild(div)
    })
}
async function createNewSession() {
    await fetch("/new_session", { method: "POST" })

    // Clear chat window
    const chatWindow = document.getElementById("chat-window")
    chatWindow.innerHTML = ""

    // OPTIONAL (important): reset input focus
    document.getElementById("message-input").focus()

    // Reload sidebar so new session appears
    loadSessions()
}

document.getElementById("message-input")
    .addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
            e.preventDefault()
            sendMessage()
        }
    })


// Load sessions when page opens
window.onload = () => {
    loadSessions()
}

</script>

</body>
</html>
