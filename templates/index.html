<!DOCTYPE html>
<html>
<head>
    <title>Local LLM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app-container">

 <!-- Sidebar -->
    <div id="sidebar">
        <h3>Chat History</h3>
        <ul id="session-list"></ul>
    </div>

      

    <!-- Main Chat Area -->
    <div class="chat-container">

        <div id="chat-window"></div>

        <div class="input-area">
            <input id="message-input" type="text" placeholder="Ask something...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>

async function sendMessage() {
    const input = document.getElementById("message-input")
    const chatWindow = document.getElementById("chat-window")

    const userMessage = input.value
    if (!userMessage) return

    chatWindow.innerHTML += `<div class="user-msg">${userMessage}</div>`
    input.value = ""

    const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMessage })
    })

    const reader = response.body.getReader()
    const decoder = new TextDecoder()

    let assistantDiv = document.createElement("div")
    assistantDiv.className = "assistant-msg"
    chatWindow.appendChild(assistantDiv)

    let done = false

    let fullText = ""

    while (!done) {
        const { value, done: doneReading } = await reader.read()
        done = doneReading

        const chunk = decoder.decode(value || new Uint8Array())
        fullText += chunk
        renderMessage(assistantDiv, fullText)
    }

    chatWindow.scrollTop = chatWindow.scrollHeight

    loadSessions()
}


async function loadSessions() {
    const response = await fetch("/sessions")
    const sessions = await response.json()

    const list = document.getElementById("session-list")
    list.innerHTML = ""  // clear everything

    // Build each session item
    sessions.forEach(session => {
        const li = document.createElement("li")
        li.className = "session-item"

        // Session date text
        const span = document.createElement("span")
        span.textContent = new Date(session.start_time).toLocaleString()
        span.className = "session-text"
        li.appendChild(span)

        // Delete button
        const deleteBtn = document.createElement("button")
        deleteBtn.className = "delete-btn"
        deleteBtn.textContent = "⋮"
        deleteBtn.onclick = async (e) => {
            e.stopPropagation()  // prevent triggering li click
            await fetch(`/delete_session/${session.session_id}`, { method: "POST" })
            loadSessions()
            document.getElementById("chat-window").innerHTML = ""
        }
        li.appendChild(deleteBtn)

        // Load session click
        li.onclick = () => loadSession(session.session_id)

        list.appendChild(li)
    })

    // Add the New Chat button dynamically at the end
    const newChatLi = document.createElement("li")
    newChatLi.className = "new-chat session-item"
    newChatLi.textContent = "+ New Chat"
    newChatLi.onclick = createNewSession
    list.appendChild(newChatLi)
}

async function loadSession(sessionId) {
    const response = await fetch(`/session/${sessionId}`)
    const messages = await response.json()

    const chatWindow = document.getElementById("chat-window")
    chatWindow.innerHTML = ""

    messages.forEach(msg => {
        const div = document.createElement("div")

        if (msg.role === "user") {
            div.className = "user-msg"
        } else {
            div.className = "assistant-msg"
        }

        renderMessage(div, msg.content)
        chatWindow.appendChild(div)
    })
}
async function createNewSession() {
    await fetch("/new_session", { method: "POST" })

    // Clear chat window
    const chatWindow = document.getElementById("chat-window")
    chatWindow.innerHTML = ""

    // OPTIONAL (important): reset input focus
    document.getElementById("message-input").focus()

    // Reload sidebar so new session appears
    loadSessions()
}

document.getElementById("message-input")
    .addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
            e.preventDefault()
            sendMessage()
        }
    })

// Simple parser for code block rendering
function renderMessage(container, content) {
    container.innerHTML = ""  // clear safely

    const codeBlockRegex = /```([\s\S]*?)```/g
    let lastIndex = 0
    let match

    while ((match = codeBlockRegex.exec(content)) !== null) {
        // TEXT before code block
        const textPart = content.slice(lastIndex, match.index)
        const textNode = document.createElement("div")
        textNode.textContent = textPart
        textNode.style.whiteSpace = "pre-wrap"
        container.appendChild(textNode)

        // CODE block
        const code = document.createElement("pre")
        const codeInner = document.createElement("code")
        codeInner.textContent = match[1].trim()
        code.appendChild(codeInner)
        container.appendChild(code)

        lastIndex = codeBlockRegex.lastIndex
    }

    // Remaining text
    const remaining = content.slice(lastIndex)
    if (remaining) {
        const textNode = document.createElement("div")
        textNode.textContent = remaining
        textNode.style.whiteSpace = "pre-wrap"
        container.appendChild(textNode)
    }
}

// code block helper
function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
}

// Load sessions when page opens
window.onload = () => {
    loadSessions()
}

</script>

</body>
</html>
