<!DOCTYPE html>
<html>
<head>
    <title>Local LLM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app-container">

    <!-- Left Sidebar -->
    <div id="sidebar">
        <h3>Chat History</h3>
        <ul id="session-list"></ul>
    </div>

      

    <!-- Main Chat Area -->
    <div class="chat-container">

        <div id="chat-window"></div>

        <div class="input-area">
            <input id="message-input" type="text" placeholder="Ask something...">
            <button onclick="sendMessage()">Send</button>
        </div>
          
    </div>
     <!-- RIGHT SIDEBAR -->
     <div class="sidebar-right">

        <div class="panel upload-panel">
            <h3>Upload</h3>
            <!--upload button 3/30-->
            <input type="file" id="csv-file-input" accept=".csv">
            <button onclick="uploadCSV()">Upload</button>

            <div id="upload-status"></div>
          
        </div>

        <div class="panel files-panel">
            <h3>Files</h3>
            <div id="file-list" class="placeholder">No files loaded</div>
        </div>

        <div class="panel code-panel">
            <h3>Code / Query</h3>
            <div id="code-output">No actions yet</div>
            <!-- <div class="placeholder">No actions yet</div> -->
        </div>

    </div>
        <!-- end right sidebar-->
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</script> -->

</body>
</html>
